<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::#content})}">
<head>
    <title th:text="${fornecedor.id == null} ? 'Novo Fornecedor' : 'Editar Fornecedor'">Fornecedor</title>
</head>
<body>

<div id="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">
            <i class="bi bi-truck me-2 text-primary"></i>
            <span th:text="${fornecedor.id == null} ? 'Novo Fornecedor' : 'Editar Fornecedor'">Fornecedor</span>
        </h1>
    </div>

    <div class="card col-md-8 offset-md-2 shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/fornecedores/salvar}" th:object="${fornecedor}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="nome" class="form-label font-weight-bold">Nome do Fornecedor <span class="text-danger">*</span></label>
                    <input type="text" id="nome" class="form-control" th:field="*{nome}" required placeholder="Nome Fantasia ou Razão Social" />
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="cnpj" class="form-label font-weight-bold">CNPJ</label>
                        <input type="text" id="cnpj" class="form-control" th:field="*{cnpj}" placeholder="00.000.000/0000-00" maxlength="18" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="telefone" class="form-label font-weight-bold">Telefone</label>
                        <input type="text" id="telefone" class="form-control" th:field="*{telefone}" placeholder="(00) 0000-0000" />
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label font-weight-bold">E-mail</label>
                    <input type="email" id="email" class="form-control" th:field="*{email}" placeholder="contato@fornecedor.com" />
                </div>

                <div class="mb-4">
                    <label for="endereco" class="form-label font-weight-bold">Endereço</label>
                    <input type="text" id="endereco" class="form-control" th:field="*{endereco}" placeholder="Av. das Nações, 1000 - Centro" />
                </div>

                <div class="d-flex justify-content-end gap-2 border-top pt-3">
                    <a th:href="@{/fornecedores}" class="btn btn-secondary">
                        <i class="bi bi-x-circle me-1"></i> Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-1"></i> Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
