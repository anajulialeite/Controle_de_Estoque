<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Categorias - Controle de Estoque</title>
</head>
<body>

<div id="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2"><i class="bi bi-tags me-2 text-primary"></i>Categorias</h1>
        <a th:href="@{/categorias/nova}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> Nova Categoria
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4" style="width: 10%;">ID</th>
                            <th style="width: 30%;">Nome</th>
                            <th style="width: 45%;">Descrição</th>
                            <th class="pe-4 text-end" style="width: 15%;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categorias}">
                            <td class="ps-4" th:text="${cat.id}">1</td>
                            <td class="fw-semibold" th:text="${cat.nome}">Alimentos</td>
                            <td class="text-muted" th:text="${cat.descricao}">Alimentos perecíveis e não perecíveis</td>
                            <td class="pe-4 text-end">
                                <a th:href="@{/categorias/editar/{id}(id=${cat.id})}" class="btn btn-sm btn-outline-secondary me-1" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/categorias/excluir/{id}(id=${cat.id})}" class="btn btn-sm btn-outline-danger" 
                                   onclick="return confirm('Tem certeza que deseja excluir esta categoria?')" title="Excluir">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categorias)}">
                            <td colspan="4" class="text-center py-4 text-muted">Nenhuma categoria cadastrada.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
