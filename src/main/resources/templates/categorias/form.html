<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::#content})}">
<head>
    <title th:text="${categoria.id == null} ? 'Nova Categoria' : 'Editar Categoria'">Categoria</title>
</head>
<body>

<div id="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">
            <i class="bi bi-tags me-2 text-primary"></i>
            <span th:text="${categoria.id == null} ? 'Nova Categoria' : 'Editar Categoria'">Categoria</span>
        </h1>
    </div>

    <div class="card col-md-8 offset-md-2 shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/categorias/salvar}" th:object="${categoria}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="nome" class="form-label font-weight-bold">Nome da Categoria <span class="text-danger">*</span></label>
                    <input type="text" id="nome" class="form-control" th:field="*{nome}" required placeholder="Ex: Bebidas, Alimentos, Eletrônicos" />
                </div>

                <div class="mb-4">
                    <label for="descricao" class="form-label font-weight-bold">Descrição</label>
                    <textarea id="descricao" class="form-control" th:field="*{descricao}" rows="4" placeholder="Descreva brevemente esta categoria..."></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2 border-top pt-3">
                    <a th:href="@{/categorias}" class="btn btn-secondary">
                        <i class="bi bi-x-circle me-1"></i> Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-1"></i> Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
